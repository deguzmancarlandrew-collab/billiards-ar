<!DOCTYPE html>
<html>
<head>
  <title>Billiards AR Fast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let ballX, ballY;
let aimX = 1;
let aimY = -0.3;

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
});

video.addEventListener("loadedmetadata", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Assume cue ball is center (manual adjust later)
  ballX = canvas.width / 2;
  ballY = canvas.height / 2;

  requestAnimationFrame(draw);
});

// TOUCH CONTROL (drag to aim)
canvas.addEventListener("touchmove", (e) => {
  let touch = e.touches[0];
  let dx = touch.clientX - ballX;
  let dy = touch.clientY - ballY;

  let len = Math.hypot(dx, dy);
  aimX = dx / len;
  aimY = dy / len;
});

function draw() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Draw cue ball position marker
  ctx.beginPath();
  ctx.arc(ballX, ballY, 20, 0, 2 * Math.PI);
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Main line
  let length = 2000;
  let endX = ballX + aimX * length;
  let endY = ballY + aimY * length;

  ctx.beginPath();
  ctx.moveTo(ballX, ballY);
  ctx.lineTo(endX, endY);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 4;
  ctx.stroke();

  requestAnimationFrame(draw);
}
</script>

</body>
</html>
