<!DOCTYPE html>
<html>
<head>
  <title>Fast Billiards AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { position:absolute; top:0; left:0; }
    #msg {
      position:absolute;
      color:white;
      top:50%;
      width:100%;
      text-align:center;
      font-size:20px;
      font-family:sans-serif;
    }
  </style>
</head>
<body>

<div id="msg">Starting camera...</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const msg = document.getElementById("msg");

let ballX, ballY;
let aimX = 1;
let aimY = 0;

navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
}).then(stream => {

  msg.style.display = "none";
  video.srcObject = stream;

}).catch(err => {

  msg.innerText = "Camera error. Check permission.";

  // fallback to any camera
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream=>{
      msg.style.display = "none";
      video.srcObject = stream;
    })
    .catch(()=>{
      msg.innerText = "Camera blocked.";
    });
});

video.addEventListener("loadedmetadata", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  ballX = canvas.width / 2;
  ballY = canvas.height / 2;

  requestAnimationFrame(draw);
});

canvas.addEventListener("touchmove", (e) => {
  let t = e.touches[0];
  let dx = t.clientX - ballX;
  let dy = t.clientY - ballY;
  let len = Math.hypot(dx, dy);
  if(len > 0){
    aimX = dx/len;
    aimY = dy/len;
  }
});

function draw(){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.arc(ballX,ballY,15,0,2*Math.PI);
  ctx.strokeStyle="lime";
  ctx.lineWidth=3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ballX,ballY);
  ctx.lineTo(ballX+aimX*2000, ballY+aimY*2000);
  ctx.strokeStyle="red";
  ctx.lineWidth=4;
  ctx.stroke();

  requestAnimationFrame(draw);
}
</script>

</body>
</html>
